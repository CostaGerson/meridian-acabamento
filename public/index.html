<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex" />
<title>Meridian · Operação</title>
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="theme-color" content="#0B1426" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" type="image/png" href="/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Meridian" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1426; --panel:#152138; --panel2:#1B2A47;
  --text:#E8ECF2; --muted:#94A0B3; --line:rgba(232,236,242,.10);
  --accent:#FF6B1A; --accentDim:#C2541A; --danger:#ff7676;
  --shadow:0 8px 30px rgba(0,0,0,.25);
  --atmo1:rgba(255,107,26,.10); --atmo2:rgba(27,42,71,.6); --accSoft:rgba(21,33,56,.6);
}
:root[data-theme="light"]{
  --bg:#F4F6FA; --panel:#FFFFFF; --panel2:#EDF1F7;
  --text:#16243B; --muted:#5C6B82; --line:rgba(11,20,38,.12);
  --accent:#FF6B1A; --accentDim:#C2541A; --danger:#D64545;
  --shadow:0 6px 20px rgba(16,36,61,.10);
  --atmo1:rgba(255,107,26,.08); --atmo2:rgba(180,200,230,.35); --accSoft:rgba(255,238,227,.9);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Archivo,sans-serif;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--panel2);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s ease both}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{height:3px;background:linear-gradient(90deg,var(--accent),var(--accentDim));position:sticky;top:0;z-index:6}
body{padding-top:env(safe-area-inset-top)}
.atmo{position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(900px 500px at 80% -10%, var(--atmo1), transparent 60%),
  radial-gradient(700px 400px at -10% 10%, var(--atmo2), transparent 60%);z-index:0}
header.app{display:flex;align-items:center;gap:12px;padding:16px 18px 14px;position:relative;z-index:1}
header.app img{width:40px;height:40px}
.brand{font-family:Oswald,sans-serif;font-weight:700;letter-spacing:.22em;font-size:20px;line-height:1}
.sub{font-size:11px;color:var(--muted);letter-spacing:.04em;margin-top:3px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.sync{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.sync.on{color:var(--accent)}
.sync svg.spin{animation:spin .8s linear}
.lockbtn{display:flex;align-items:center;gap:5px;background:rgba(255,107,26,.12);border:1px solid rgba(255,107,26,.4);
  color:var(--accent);border-radius:8px;padding:6px 9px;cursor:pointer;font-size:11px;font-weight:700;font-family:Archivo,sans-serif}
main{max-width:760px;margin:0 auto;padding:6px 16px 110px;position:relative;z-index:1}
h2.sec{font-family:Oswald,sans-serif;font-size:24px;font-weight:600;margin:0;letter-spacing:.02em}
.secsub{margin:4px 0 0;color:var(--muted);font-size:13.5px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.card.acc{border-left:3px solid var(--accent)}
label.f{display:block;margin-bottom:14px}
label.f>.lab{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}
label.f>.hint{display:block;font-size:11px;color:var(--muted);margin-top:4px}
input,select{width:100%;max-width:100%;min-width:0;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:10px;
  padding:11px 12px;font-size:15px;font-family:Archivo,sans-serif;outline:none}
input:focus,select:focus{border-color:var(--accent)}
select{appearance:none}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row>*{min-width:0}
label.f{min-width:0}
input[type="date"],input[type="time"]{-webkit-appearance:none;appearance:none}
@media (max-width:520px){.row{grid-template-columns:1fr}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 18px;border-radius:10px;
  font-weight:700;font-size:14px;letter-spacing:.02em;cursor:pointer;font-family:Archivo,sans-serif;border:none;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);color:#0B1426}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
.btn.full{width:100%}
.btn[disabled]{opacity:.45;pointer-events:none}
.mini{flex:1;min-width:110px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
.mini .ml{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.mini .mv{font-family:Oswald,sans-serif;font-size:16px;font-weight:600;margin-top:2px}
.results{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.res{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.res.acc{background:linear-gradient(160deg,rgba(255,107,26,.14),var(--accSoft));border-color:rgba(255,107,26,.4)}
.res .rh{display:flex;align-items:center;gap:7px;color:var(--muted);margin-bottom:8px}
.res.acc .rh{color:var(--accent)}
.res .rh span{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.res .big{font-family:Oswald,sans-serif;font-size:28px;font-weight:700;line-height:1}
.res.acc .big{color:var(--accent)}
.res .rsub{font-size:11.5px;color:var(--muted);margin-top:6px}
.kv{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:6px}
.kv .k{color:var(--muted);font-size:13px}.kv .v{font-weight:700;font-size:13px}
.iconbtn{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px;cursor:pointer;color:var(--text);display:flex}
.histcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow)}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);
  border-top:1px solid var(--line);display:flex;justify-content:center;gap:4px;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:40;
  transform:translateZ(0);-webkit-transform:translateZ(0);will-change:transform}
.tabbtn{flex:1;max-width:150px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:6px 4px;color:var(--muted);font-family:Archivo,sans-serif;position:relative}
.tabbtn.on{color:var(--accent)}
.tabbtn .lbl{font-size:10.5px;font-weight:500;letter-spacing:.03em}
.tabbtn.on .lbl{font-weight:700}
.tabicon{position:relative;display:flex}
.tabicon .lk{position:absolute;right:-7px;top:-6px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:60}
.sheet{width:100%;max-width:520px;max-height:90vh;overflow-y:auto;background:var(--panel);border-radius:18px 18px 0 0;
  border-top:3px solid var(--accent);padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.sheet h3{font-family:Oswald,sans-serif;font-size:19px;font-weight:600;letter-spacing:.03em;margin:0}
.sheet .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.xbtn{background:none;border:none;color:var(--muted);cursor:pointer}
.stage{padding:12px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13.5px;font-family:Archivo,sans-serif;
  border:1px solid var(--line);background:var(--bg);color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px}
.stage.on{border-color:var(--accent);background:rgba(255,107,26,.12);color:var(--accent)}
.warn{border-left:3px solid var(--danger);display:flex;gap:12px;align-items:flex-start}
.flex{display:flex}.gap10{gap:10px}.gap16{gap:16px}.wrap{flex-wrap:wrap}
.muted{color:var(--muted)}.acccolor{color:var(--accent)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--accent);color:#0B1426;
  font-weight:700;padding:10px 18px;border-radius:10px;z-index:80;font-size:14px;box-shadow:0 8px 30px rgba(0,0,0,.4)}

.home{display:flex;flex-direction:column;gap:16px;margin-top:8px}
.homecard{background:linear-gradient(160deg,var(--panel),var(--panel2));border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:18px;padding:22px;cursor:pointer;display:flex;align-items:center;gap:18px;box-shadow:var(--shadow);transition:transform .12s}
.homecard:active{transform:scale(.985)}
.homecard .hicon{width:54px;height:54px;border-radius:14px;background:rgba(255,107,26,.12);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
.homecard h3{font-family:Oswald,sans-serif;font-size:22px;font-weight:600;letter-spacing:.04em;margin:0}
.homecard p{margin:5px 0 0;color:var(--muted);font-size:13px;line-height:1.4}
.homecard .arrow{margin-left:auto;color:var(--muted)}
.backbtn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:12px;font-weight:700;font-family:Archivo,sans-serif}
.seg{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:5px;margin-bottom:16px}
.segb{flex:1;background:none;border:none;color:var(--muted);font-family:Archivo,sans-serif;font-weight:700;font-size:13px;padding:9px 4px;border-radius:8px;cursor:pointer}
.segb.on{background:rgba(255,107,26,.14);color:var(--accent)}
.daycard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer}
.daycard.has{border-color:rgba(255,107,26,.5)}
.daynum{text-align:center;width:46px;flex-shrink:0}
.chip{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 4px;font-size:12px;font-weight:700;font-family:Archivo,sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.selrow{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;background:var(--bg);border:1px solid var(--line);cursor:pointer}
.selrow.on{background:rgba(255,107,26,.12);border-color:var(--accent)}
.cbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#0B1426}
.selrow.on .cbox{background:var(--accent);border-color:var(--accent)}
.bar{height:6px;background:var(--bg);border-radius:6px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--accent)}
.ctag{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:6px 6px 6px 12px;font-size:13px;margin:0 6px 6px 0}
.ctag button{background:none;border:none;color:var(--muted);cursor:pointer;display:flex;padding:2px;border-radius:50%}
</style>
<script>try{document.documentElement.setAttribute("data-theme",localStorage.getItem("mtheme")||"dark")}catch(e){}</script>

function svg(name, size){size=size||18;return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+I[name]+'</svg>';}

/* ===================== HELPERS DE CALCULO ===================== */
const norm = s => (s||"").trim().toLowerCase();
const postosDe = p => p ? (p.arremate?1:0)+(p.abotoar?1:0)+(p.dobrar?1:0)+(p.embalar?1:0) : 0;
function minutosEntre(ini,fim){if(!ini||!fim)return 0;const[h1,m1]=ini.split(":").map(Number);const[h2,m2]=fim.split(":").map(Number);return(h2*60+m2)-(h1*60+m1);}
function quartilInc(arr,p){const a=[...arr].sort((x,y)=>x-y);const n=a.length;if(!n)return 0;if(n===1)return a[0];const rank=p*(n-1);const lo=Math.floor(rank);const fr=rank-lo;if(lo+1>=n)return a[n-1];return a[lo]+fr*(a[lo+1]-a[lo]);}
const avg=a=>a.length?a.reduce((s,x)=>s+x,0)/a.length:0;
function fmt(v,d){d=(d===undefined?1:d);return isFinite(v)?v.toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d}):"—";}
function fmtH(h){if(!isFinite(h)||h<=0)return"—";const t=Math.round(h*60);return Math.floor(t/60)+"h "+String(t%60).padStart(2,"0")+"min";}
function metricsRec(r){const minutos=Math.max(0,minutosEntre(r.inicio,r.fim)-(Number(r.pausa)||0));const seg=minutos*60;const q=Number(r.quantidade)||0;return{minutos,tempoCiclo:q>0?seg/q:0,prodHr:minutos>0?(60*q)/minutos:0};}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

let syncTimer=null;

async function api(path,opts){opts=opts||{};const headers={"Content-Type":"application/json"};if(state.pin)headers["x-pin"]=state.pin;
  const res=await fetch(path,{method:opts.method||"GET",headers,body:opts.body?JSON.stringify(opts.body):undefined});
  if(!res.ok){let e={};try{e=await res.json();}catch(_){}throw new Error(e.error||("erro "+res.status));}
  return res.status===204?null:res.json();}

async function loadProducts(){try{state.products=await api("/api/products");}catch(e){}}
async function loadCollaborators(){try{state.collaborators=await api("/api/collaborators");}catch(e){}}
async function loadRecords(){if(!state.unlocked)return;try{state.records=await api("/api/records");}catch(e){if((""+e).includes("401")){lock();}}}
async function loadGestao(){if(!state.unlocked)return;try{const g=await api("/api/gestao");state.freelancers=g.freelancers||[];state.payments=g.payments||[];state.weeks=g.weeks||{};}catch(e){if((""+e).includes("401")){lock();}}
  try{state.pressRecords=await api("/api/press");}catch(e){}}

function flashSync(){const el=document.querySelector("#syncbox");if(!el)return;el.classList.add("on");el.querySelector("svg").classList.add("spin");
  setTimeout(()=>{el.classList.remove("on");const s=el.querySelector("svg");if(s)s.classList.remove("spin");},1100);}

async function poll(){
  await loadProducts();await loadCollaborators();
  if(state.unlocked){await loadRecords(); if(!state.modal) await loadGestao();}
  flashSync();
  if(state.area==="gestao"){
    if(state.gtab==="calculadora"){calcRecompute();pressCalcRecompute();}
    else if(state.gtab==="historico" && !state.modal) renderTab();
  }
}

let calcBase="q3";
function calcRecompute(){
  if(state.area!=="gestao"||state.gtab!=="calculadora"||state.ctab!=="acab")return;
  const produto=val("c_prod");
  const prod=state.products.find(p=>p.nome===produto);
  const recs=state.records.filter(r=>norm(r.produto)===norm(produto));
  const ms=recs.map(metricsRec);
  const prodHr=avg(ms.map(x=>x.prodHr).filter(v=>v>0));
  const tcMedia=avg(ms.map(x=>x.tempoCiclo).filter(v=>v>0));
  const tcQ3=quartilInc(ms.map(x=>x.tempoCiclo).filter(v=>v>0),0.75);
  const postos=postosDe(prod);const n=recs.length;
  const D=Number(val("c_dem"))||0,CH=Number(val("c_ch"))||0,CHora=Number(val("c_cu"))||0;
  const efic=CH*0.85,disp=efic*3600;
  const takt=D>0?disp/D:0;const tc=calcBase==="q3"?tcQ3:tcMedia;
  const ocup=takt>0?tc/takt:0;const tEst=prodHr>0?D/prodHr:0;
  const custo=postos*tEst*CHora;const sug=Math.ceil(postos*ocup);const horasDia=efic>0?tEst/efic:0;
  const sem=n===0||prodHr<=0;
  set("c_info",'Eficiência considerada: <b style="color:var(--text)">85%</b> → '+fmt(efic,2)+' h úteis. Postos do produto: <b style="color:var(--text)">'+postos+'</b> · Amostras na base: <b style="color:'+(sem?"var(--danger)":"var(--text)")+'">'+n+'</b>',true);
  document.getElementById("c_warn").innerHTML=sem?'<div class="card warn" style="margin-bottom:16px"><span style="color:var(--danger);flex-shrink:0">'+svg("alert",20)+'</span><div style="font-size:13.5px">Ainda não há registros de <b>'+esc(produto||"produto")+'</b> na base. Registre algumas produções na aba <b>Registrar</b> para liberar as estimativas.</div></div>':"";
  txt("c_tempo",fmtH(tEst));txt("c_tempo_s",fmt(tEst,2)+" h · "+fmt(horasDia,2)+" jornadas");
  txt("c_postos",sem?"—":String(sug));txt("c_postos_s","Linha padrão: "+postos+" postos");

  const csv=[head,...rows].map(r=>r.map(q).join(";")).join("\r\n");

  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="base_meridian_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);

function bindTab(){
  if(!state.area){bindHome();return;}
  if(state.area==="producao"){
    document.querySelectorAll(".segb[data-ptab]").forEach(function(b){b.onclick=function(){state.ptab=b.dataset.ptab;renderTab();};});

    document.getElementById("r_save").onclick=async()=>{
      const f=regForm();const m=metricsRec(f);
      if(!(f.cliente&&f.produto&&f.inicio&&f.fim&&Number(f.quantidade)>0&&m.minutos>0))return;
      try{await api("/api/records",{method:"POST",body:f});toast("Salvo na base");
        const data=f.data;renderTab();document.getElementById("r_data").value=data;regPreview();
      }catch(e){toast("Erro: "+e.message);}
    };
    regPreview();
    return;
  }
  if(state.gtab==="calculadora"){
    document.querySelectorAll(".segb[data-ctab]").forEach(function(b){b.onclick=function(){state.ctab=b.dataset.ctab;renderTab();};});
    if(state.ctab==="press"){bindPressCalc();return;}
    ["c_prod","c_dem","c_ch","c_cu"].forEach(id=>{const e=document.getElementById(id);if(e)e.addEventListener("input",calcRecompute);});
    document.getElementById("c_prod").addEventListener("change",calcRecompute);
    document.querySelectorAll(".stage[data-base]").forEach(b=>b.onclick=()=>{calcBase=b.dataset.base;
      document.querySelectorAll(".stage[data-base]").forEach(x=>x.classList.toggle("on",x.dataset.base===calcBase));calcRecompute();});
    calcRecompute();
  }else if(state.gtab==="historico"){
    document.querySelectorAll(".segb[data-htab]").forEach(function(b){b.onclick=function(){state.htab=b.dataset.htab;renderTab();};});
    if(state.htab==="press"){bindPressHist();return;}
    document.getElementById("h_export").onclick=exportCSV;
    document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openEditRecord(b.dataset.edit));
    document.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{try{await api("/api/records/"+b.dataset.del,{method:"DELETE"});await loadRecords();renderTab();}catch(e){toast("Erro: "+e.message);}});
  }else if(state.gtab==="produtos"){
    bindCollaborators();
    document.getElementById("p_new").onclick=()=>openProdModal("new");
    document.querySelectorAll("[data-pedit]").forEach(b=>b.onclick=()=>openProdModal(b.dataset.pedit));
    document.querySelectorAll("[data-pdel]").forEach(b=>b.onclick=()=>delProduct(b.dataset.pdel));
    document.getElementById("p_pin").value=state.pin||"";
    document.getElementById("p_savepin").onclick=async()=>{const np=val("p_pin").trim();if(!np)return;
      try{await api("/api/change-pin",{method:"POST",body:{pin:np}});state.pin=np;sessionStorage.setItem("mpin",np);toast("Senha atualizada");}catch(e){toast("Erro: "+e.message);}};
  }else if(state.gtab==="freelancers"){
    bindFreel();
  }
}

const FDIAS=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
const FDIAS_C=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];
function brl(n){return "R$ "+(Number(n)||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});}
function totalDia(f){return (Number(f.diaria)||0)+(Number(f.passagem)||0);}
function fISO(d){var x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
function fMondayISO(d){var x=new Date(d);x.setHours(0,0,0,0);var k=(x.getDay()+6)%7;x.setDate(x.getDate()-k);return fISO(x);}
function fDayISO(monIso,i){var x=new Date(monIso+"T00:00:00");x.setDate(x.getDate()+i);return fISO(x);}
function fDM(iso){return iso.slice(8,10)+"/"+iso.slice(5,7);}
function copyText(t){if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(t).then(function(){toast("Copiado!");}).catch(function(){fbCopy(t);});}else fbCopy(t);}
function fbCopy(t){var ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");toast("Copiado!");}catch(e){toast("Não foi possível copiar");}document.body.removeChild(ta);}

function fWeekTotals(){
  var wk=state.weeks[state.fmonday]||{};var map={};
  Object.keys(wk).forEach(function(k){(wk[k]||[]).forEach(function(e){var n=normEntry(e);var f=state.freelancers.find(function(x){return x.id===n.id;});if(!f)return;if(!map[n.id])map[n.id]={dias:0,valor:0,parcial:false};map[n.id].dias+=1;map[n.id].valor+=entryValor(f,n);if(n.h!=null&&n.h!==""&&Number(n.h)>0&&Number(n.h)<BASE_HOURS)map[n.id].parcial=true;});});
  return Object.keys(map).map(function(id){var f=state.freelancers.find(function(x){return x.id===id;});if(!f)return null;return{f:f,dias:map[id].dias,valor:map[id].valor,parcial:map[id].parcial};}).filter(Boolean).sort(function(a,b){return a.f.nome.localeCompare(b.f.nome);});
}

  } else { resumo='<p class="muted" style="font-size:13px;margin:2px 0">Adicione prestadores aos dias para ver o valor devido a cada um.</p>'; }

function renderFDay(){
  var i=state._fday;var mon=state.fmonday;var wk=state.weeks[mon]||{};var sel=(wk[i]||[]).map(normEntry);

function fPresets(){
  var t=new Date();var y=t.getFullYear(),m=t.getMonth();
  var f=function(yy,mm,dd){return yy+"-"+String(mm+1).padStart(2,"0")+"-"+String(dd).padStart(2,"0");};
  var pm=m===0?11:m-1, py=m===0?y-1:y;
  var min=state.payments.length?state.payments.map(function(p){return p.weekStart;}).sort()[0]:fISO(t);
  return {"Mês atual":[f(y,m,1),fISO(t)],"Mês passado":[f(py,pm,1),f(py,pm,new Date(py,pm+1,0).getDate())],"Ano atual":[y+"-01-01",fISO(t)],"Tudo":[min,fISO(t)]};
}
function viewFPagamentos(){
  var pr=fPresets();
  if(!state.fp_de){state.fp_de=pr["Tudo"][0];state.fp_ate=pr["Tudo"][1];state.fp_preset="Tudo";}
  var de=state.fp_de,ate=state.fp_ate,func=state.fp_func||"todas";
  var funcoes=Array.from(new Set([].concat.apply([],state.payments.map(function(p){return p.items.map(function(i){return i.funcao;});})))).sort();
  var filt=state.payments.filter(function(p){return p.weekStart>=de&&p.weekStart<=ate;}).sort(function(a,b){return b.weekStart.localeCompare(a.weekStart);});
  var gasto=filt.reduce(function(s,p){return s+p.items.filter(function(i){return func==="todas"||i.funcao===func;}).reduce(function(a,i){return a+i.valor;},0);},0);
  var byf={};filt.forEach(function(p){p.items.forEach(function(i){byf[i.funcao]=(byf[i.funcao]||0)+i.valor;});});
  var ordf=Object.keys(byf).map(function(k){return [k,byf[k]];}).sort(function(a,b){return b[1]-a[1];});
  var chips=Object.keys(pr).map(function(n){return '<button class="segb'+(state.fp_preset===n?" on":"")+'" data-fpreset="'+n+'" style="flex:0 0 auto;padding:8px 13px;border-radius:20px;border:1px solid '+(state.fp_preset===n?"var(--accent)":"var(--line)")+'">'+n+'</button>';}).join("");
  var bars = (func==="todas"&&ordf.length)?('<div class="card" style="margin-bottom:16px"><div class="lab" style="margin-bottom:12px">Gasto por função</div>'+ordf.map(function(o){var pct=gasto?(o[1]/gasto*100):0;return '<div style="margin-bottom:10px"><div class="flex" style="justify-content:space-between;font-size:13px;margin-bottom:4px"><span>'+esc(o[0])+'</span><span style="font-weight:700">'+brl(o[1])+'</span></div><div class="bar"><i style="width:'+pct+'%"></i></div></div>';}).join("")+'</div>'):"";
  var lista = filt.length?filt.map(function(p){
    var op=state.fp_open===p.id;
    var det=op?('<div style="border-top:1px solid var(--line);margin-top:10px;padding-top:6px">'+p.items.map(function(i){return '<div class="flex" style="justify-content:space-between;font-size:13px;padding:5px 0"><span style="flex:1">'+esc(i.nome)+'</span><span style="font-weight:600">'+brl(i.valor)+'</span></div>';}).join("")+'</div>'):"";
    return '<div class="histcard" data-fp="'+p.id+'" style="cursor:pointer"><div class="flex" style="justify-content:space-between;align-items:center;gap:10px"><div><div style="font-family:Oswald,sans-serif;font-size:15px;font-weight:600">'+fDM(p.weekStart)+(p.weekEnd&&p.weekEnd!==p.weekStart?' — '+fDM(p.weekEnd):"")+'</div><div class="muted" style="font-size:11px">'+p.items.length+' prestadores · '+p.ano+(p.fonte==="importado"?" · Bling":"")+'</div></div><span class="acccolor" style="font-family:Oswald,sans-serif;font-weight:600;font-size:16px">'+brl(p.total)+'</span></div>'+det+'</div>';
  }).join(""):'<p class="muted" style="font-size:13px">Nenhum lançamento nesse período.</p>';
  var funcSel='<select id="fp_func"><option value="todas"'+(func==="todas"?" selected":"")+'>Todas</option>'+funcoes.map(function(fn){return '<option value="'+esc(fn)+'"'+(fn===func?" selected":"")+'>'+esc(fn)+'</option>';}).join("")+'</select>';
  return sectionTitle("Histórico de pagamentos","Filtre por período e função.")+
    '<div style="display:flex;gap:7px;overflow-x:auto;margin-bottom:11px">'+chips+'</div>'+
    '<div class="row">'+field("De",'<input type="date" id="fp_de" value="'+de+'">')+field("Até",'<input type="date" id="fp_ate" value="'+ate+'">')+'</div>'+
    field("Função",funcSel)+
    '<div class="res acc" style="margin:6px 0 16px"><div class="rh">'+svg("dollar",16)+'<span>Gasto '+(func==="todas"?"total":("com "+esc(func)))+'</span></div><div class="big">'+brl(gasto)+'</div><div class="rsub">'+fDM(de)+' a '+fDM(ate)+' · '+filt.length+' lançamento(s)</div></div>'+
    bars+
    '<div class="flex" style="flex-direction:column;gap:9px">'+lista+'</div>';
}

  }else{
    var de=document.getElementById("fp_de"),ate=document.getElementById("fp_ate"),fn=document.getElementById("fp_func");
    if(de)de.addEventListener("change",function(e){state.fp_de=e.target.value;state.fp_preset="";renderTab();});

  }

const BASE_HOURS=8;
function normEntry(e){return typeof e==="string"?{id:e}:e;}
function entryValor(f,e){e=normEntry(e);var dia=Number(f.diaria)||0;var pas=Number(f.passagem)||0;
  if(e.h!=null&&e.h!==""&&Number(e.h)>0&&Number(e.h)<BASE_HOURS){return dia*(Number(e.h)/BASE_HOURS)+pas;}
  return dia+pas;}

     '<div class="mini"><div class="ml">Produtividade</div><div class="mv" id="ppv_pr">—</div></div>'+
   '</div>'+
   '<button class="btn primary full" id="pp_save" disabled>'+svg("plus",16)+' Salvar prensagem</button>'+
   '<p class="secsub" id="pp_help" style="text-align:center;margin-top:10px">Técnica, horários e quantidade são obrigatórios.</p>'+
   '</div></div>';
}
function pressForm(){return{data:val("pp_data"),colaborador:val("pp_colab"),tecnica:val("pp_tec"),prensagem:val("pp_tec")==="DTF"?val("pp_pren"):"",peca:val("pp_peca"),parte:val("pp_parte"),tipo:val("pp_tipo"),aberta:val("pp_aberta"),inicio:val("pp_inicio"),fim:val("pp_fim"),pausa:val("pp_pausa"),quantidade:val("pp_qt"),obs:val("pp_obs")};}
function pressPreview(){
  var f=pressForm();var m=metricsRec(f);
  txt("ppv_min",m.minutos>0?m.minutos+" min":"—");
  txt("ppv_tc",m.tempoCiclo>0?fmt(m.tempoCiclo)+" s/pç":"—");
  txt("ppv_pr",m.prodHr>0?fmt(m.prodHr)+" pç/h":"—");
  var ok=f.tecnica&&f.inicio&&f.fim&&Number(f.quantidade)>0&&m.minutos>0;
  var sv=document.getElementById("pp_save");if(sv)sv.disabled=!ok;
  var hp=document.getElementById("pp_help");if(hp)hp.style.display=ok?"none":"block";
}
function bindPress(){
  ["pp_data","pp_colab","pp_tec","pp_pren","pp_peca","pp_parte","pp_tipo","pp_aberta","pp_inicio","pp_fim","pp_pausa","pp_qt","pp_obs"].forEach(function(id){var e=document.getElementById(id);if(e){e.addEventListener("input",pressPreview);e.addEventListener("change",pressPreview);}});
  var tec=document.getElementById("pp_tec");
  function tog(){document.getElementById("pp_pren_wrap").style.display=tec.value==="DTF"?"":"none";}
  tec.addEventListener("change",tog);tog();
  document.getElementById("pp_save").onclick=async function(){
    var f=pressForm();var m=metricsRec(f);
    if(!(f.tecnica&&f.inicio&&f.fim&&Number(f.quantidade)>0&&m.minutos>0))return;
    try{await api("/api/press",{method:"POST",body:f});toast("Prensagem salva");
      var d=f.data;renderTab();var el=document.getElementById("pp_data");if(el)el.value=d;pressPreview();
    }catch(e){toast("Erro: "+e.message);}
  };
  pressPreview();
}

/* ---------- PRENSAGEM: calculadora ---------- */
function pressDistinct(key,tec){var set={};state.pressRecords.forEach(function(r){if(tec&&r.tecnica!==tec)return;var v=(r[key]||"").trim();if(v)set[v]=1;});return Object.keys(set).sort();}
function viewPressCalc(){
  var tec=state.pc_tec||"DTF";var pecas=pressDistinct("peca",tec);
  return '<div class="fu">'+sectionTitle("Calculadora de prensagem","Tempo de aplicação a partir da base. No DTF, soma 1ª + 2ª prensagem.")+
   '<div class="card" style="margin-bottom:16px">'+
   '<div class="row">'+field("Técnica",'<select id="pc_tec"><option value="DTF"'+(tec==="DTF"?" selected":"")+'>DTF</option><option value="SUBLIMACAO"'+(tec==="SUBLIMACAO"?" selected":"")+'>Sublimação</option></select>')+
     field("Peça aberta ou fechada",'<select id="pc_aberta"><option value="todas">Todas</option><option value="Fechada">Fechada</option><option value="Aberta">Aberta</option></select>')+'</div>'+
   '<div class="row">'+field("Peça",'<select id="pc_peca"><option value="todas">Todas</option>'+pecas.map(function(x){return '<option value="'+esc(x)+'">'+esc(x)+'</option>';}).join("")+'</select>')+
     field("Quantidade (peças)",'<input type="number" min="0" id="pc_qt" value="100">')+'</div>'+
   '<div class="row">'+field("Carga horária (h)",'<input type="number" min="0" id="pc_ch" value="8">')+
     field("Base do tempo",'<div class="flex gap10"><button class="stage on" data-pbase="q3" style="flex:1">Quartil 3</button><button class="stage" data-pbase="media" style="flex:1">Média</button></div>')+'</div>'+
   '<p class="secsub" id="pc_info" style="margin:0"></p>'+
   '</div>'+
   '<div id="pc_warn"></div>'+
   '<div class="results">'+
     resCard("clock","Tempo por peça (aplicação)","pc_tpp","pc_tpp_s",true)+
     resCard("gauge","Tempo total estimado","pc_tot","pc_tot_s",false)+
   '</div>'+
   '<div class="card"><div class="lab" style="margin-bottom:12px">Detalhe</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 18px">'+
     kvRow("1ª prensagem (s/pç)","pc_s1")+kvRow("2ª prensagem (s/pç)","pc_s2")+kvRow("Amostras 1ª","pc_n1")+kvRow("Amostras 2ª","pc_n2")+
   '</div></div></div>';
}
let pressBase="q3";
function pressCalcRecompute(){
  if(state.area!=="gestao"||state.gtab!=="calculadora"||state.ctab!=="press")return;
  var tec=val("pc_tec");var aberta=val("pc_aberta");var peca=val("pc_peca");
  var qt=Number(val("pc_qt"))||0;
  function pool(pren){return state.pressRecords.filter(function(r){
    if(r.tecnica!==tec)return false;
    if(aberta!=="todas"&&r.aberta!==aberta)return false;
    if(peca!=="todas"&&r.peca!==peca)return false;
    if(pren&&String(r.prensagem)!==pren)return false;
    return true;
  }).map(function(r){return metricsRec(r).tempoCiclo;}).filter(function(v){return v>0;});}
  function base(arr){return pressBase==="q3"?quartilInc(arr,0.75):avg(arr);}
  var s1,s2,n1,n2,segTotal;
  if(tec==="DTF"){var a1=pool("1"),a2=pool("2");s1=base(a1);s2=base(a2);n1=a1.length;n2=a2.length;segTotal=s1+s2;}
  else{var a=pool("");s1=base(a);s2=0;n1=a.length;n2=0;segTotal=s1;}
  var sem=(tec==="DTF")?(n1===0||n2===0):(n1===0);
  var totalH=(segTotal*qt)/3600;
  set("pc_info",'Base: <b style="color:var(--text)">'+(pressBase==="q3"?"Quartil 3":"Média")+'</b> · '+(tec==="DTF"?"soma 1ª + 2ª prensagem":"prensagem única"),true);
  document.getElementById("pc_warn").innerHTML=sem?'<div class="card warn" style="margin-bottom:16px"><span style="color:var(--danger);flex-shrink:0">'+svg("alert",20)+'</span><div style="font-size:13.5px">Faltam registros'+(tec==="DTF"?" de 1ª e/ou 2ª prensagem":"")+' pra essa combinação. Lance prensagens em <b>Produção › Prensagem</b>.</div></div>':"";
  txt("pc_tpp",sem?"—":fmt(segTotal)+" s/pç");txt("pc_tpp_s",tec==="DTF"?("1ª "+fmt(s1)+" + 2ª "+fmt(s2)+" s"):"prensagem única");
  txt("pc_tot",sem?"—":fmtH(totalH));txt("pc_tot_s",qt>0?(fmt(qt,0)+" peças · "+fmt(totalH,2)+" h"):"—");
  txt("pc_s1",n1?fmt(s1)+" s":"—");txt("pc_s2",tec==="DTF"?(n2?fmt(s2)+" s":"—"):"n/a");txt("pc_n1",String(n1));txt("pc_n2",tec==="DTF"?String(n2):"n/a");
  ["pc_tpp_box","pc_tot_box"].forEach(function(id){var e=document.getElementById(id);if(e)e.style.opacity=sem?0.55:1;});
}
function bindPressCalc(){
  ["pc_tec","pc_aberta","pc_peca","pc_qt","pc_ch"].forEach(function(id){var e=document.getElementById(id);if(e){e.addEventListener("input",pressCalcRecompute);e.addEventListener("change",pressCalcRecompute);}});
  var t=document.getElementById("pc_tec");if(t)t.addEventListener("change",function(){state.pc_tec=val("pc_tec");renderTab();});
  document.querySelectorAll(".stage[data-pbase]").forEach(function(b){b.onclick=function(){pressBase=b.dataset.pbase;document.querySelectorAll(".stage[data-pbase]").forEach(function(x){x.classList.toggle("on",x.dataset.pbase===pressBase);});pressCalcRecompute();};});
  pressCalcRecompute();
}

/* ---------- PRENSAGEM: historico ---------- */
function viewPressHist(){
  var cards=state.pressRecords.length?state.pressRecords.map(pressHistCard).join(""):'<div class="card"><span class="muted">Nenhuma prensagem registrada.</span></div>';
  return '<div class="flex" style="justify-content:space-between;align-items:flex-end;margin-bottom:14px;gap:10px">'+
   '<div>'+sectionTitle("Histórico de prensagem",state.pressRecords.length+" registro(s).")+'</div>'+
   '<button class="btn ghost" id="ph_export" style="padding:10px 14px;white-space:nowrap">'+svg("download",15)+' Exportar</button></div>'+
   '<div class="flex" style="flex-direction:column;gap:10px">'+cards+'</div>';
}
function pressHistCard(r){
  var m=metricsRec(r);var tag=r.tecnica==="DTF"?("DTF "+(r.prensagem==="2"?"2ª":"1ª")):"Sublimação";
  return '<div class="histcard"><div class="flex" style="justify-content:space-between;align-items:flex-start;gap:10px">'+
   '<div><div style="font-family:Oswald,sans-serif;font-size:16px;font-weight:600">'+esc(r.peca||"—")+(r.parte?" · "+esc(r.parte):"")+' <span class="acccolor">· '+r.quantidade+' pç</span></div>'+
   '<div class="muted" style="font-size:12.5px;margin-top:3px">'+tag+(r.tipo?" · "+esc(r.tipo):"")+(r.aberta?" · "+esc(r.aberta):"")+'</div>'+
   '<div class="muted" style="font-size:12px;margin-top:2px">'+esc(r.data)+' · '+esc(r.inicio)+'–'+esc(r.fim)+(r.colaborador?" · "+esc(r.colaborador):"")+'</div></div>'+
   '<div class="flex" style="gap:6px"><button class="iconbtn" data-pedit2="'+r.id+'">'+svg("pencil",16)+'</button><button class="iconbtn" data-pdel2="'+r.id+'">'+svg("trash",16)+'</button></div></div>'+
   '<div class="flex gap16 wrap" style="margin-top:10px;font-size:12.5px">'+
   '<span class="muted">Trabalhado <b style="color:var(--text)">'+m.minutos+' min</b></span>'+
   '<span class="muted">Por peça <b style="color:var(--text)">'+fmt(m.tempoCiclo)+' s</b></span>'+
   '<span class="muted">Prod. <b style="color:var(--text)">'+fmt(m.prodHr)+' pç/h</b></span></div>'+
   (r.obs?'<div class="muted" style="font-size:12px;margin-top:8px;font-style:italic">“'+esc(r.obs)+'”</div>':'')+'</div>';
}
function bindPressHist(){
  var ex=document.getElementById("ph_export");if(ex)ex.onclick=exportPressCSV;
  document.querySelectorAll("[data-pedit2]").forEach(function(b){b.onclick=function(){openEditPress(b.dataset.pedit2);};});
  document.querySelectorAll("[data-pdel2]").forEach(function(b){b.onclick=async function(){try{await api("/api/press/"+b.dataset.pdel2,{method:"DELETE"});state.pressRecords=state.pressRecords.filter(function(x){return x.id!==b.dataset.pdel2;});renderTab();}catch(e){toast("Erro: "+e.message);}};});
}
function exportPressCSV(){
  var DQ=String.fromCharCode(34);
  var head=["Data","Colaborador","Tecnica","Prensagem","Peca","Parte","Tipo","Aberta/Fechada","Inicio","Fim","Pausa(min)","Quantidade","Seg por peca","Prod(pc/h)","Obs"];
  var q=function(v){return DQ+String(v==null?"":v).split(DQ).join(DQ+DQ)+DQ;};
  var rows=state.pressRecords.map(function(r){var m=metricsRec(r);return [r.data,r.colaborador,r.tecnica,r.prensagem,r.peca,r.parte,r.tipo,r.aberta,r.inicio,r.fim,r.pausa,r.quantidade,m.tempoCiclo.toFixed(2),m.prodHr.toFixed(2),r.obs];});
  var csv=[head].concat(rows).map(function(r){return r.map(q).join(";");}).join("\r\n");
  var blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="prensagem_meridian_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(url);
}
function openEditPress(id){
  var r=state.pressRecords.find(function(x){return x.id===id;});if(!r)return;state.modal="epress";
  document.getElementById("modalRoot").innerHTML='<div class="overlay" id="ov"><div class="sheet">'+
   '<div class="sh"><h3>EDITAR PRENSAGEM</h3><button class="xbtn" id="cx">'+svg("x",20)+'</button></div>'+
   '<div class="row">'+field("Data",'<input type="date" id="ep_data" value="'+esc(r.data)+'">')+field("Colaborador",'<select id="ep_colab">'+collabOptions(r.colaborador)+'</select>')+'</div>'+
   '<div class="row">'+field("Técnica",'<select id="ep_tec"><option value="DTF"'+(r.tecnica==="DTF"?" selected":"")+'>DTF</option><option value="SUBLIMACAO"'+(r.tecnica==="SUBLIMACAO"?" selected":"")+'>Sublimação</option></select>')+field("Prensagem",'<select id="ep_pren"><option value="1"'+(r.prensagem==="1"?" selected":"")+'>1ª</option><option value="2"'+(r.prensagem==="2"?" selected":"")+'>2ª</option></select>')+'</div>'+
   '<div class="row">'+field("Peça",'<input id="ep_peca" value="'+esc(r.peca)+'">')+field("Parte",'<input id="ep_parte" value="'+esc(r.parte)+'">')+'</div>'+
   '<div class="row">'+field("Tipo",'<input id="ep_tipo" value="'+esc(r.tipo)+'">')+field("Aberta/Fechada",'<select id="ep_aberta"><option value="Fechada"'+(r.aberta==="Fechada"?" selected":"")+'>Fechada</option><option value="Aberta"'+(r.aberta==="Aberta"?" selected":"")+'>Aberta</option></select>')+'</div>'+
   '<div class="row">'+field("Início",'<input type="time" id="ep_inicio" value="'+esc(r.inicio)+'">')+field("Fim",'<input type="time" id="ep_fim" value="'+esc(r.fim)+'">')+'</div>'+
   '<div class="row">'+field("Pausa (min)",'<input type="number" min="0" id="ep_pausa" value="'+r.pausa+'">')+field("Quantidade",'<input type="number" min="1" id="ep_qt" value="'+r.quantidade+'">')+'</div>'+
   field("Observação",'<input id="ep_obs" value="'+esc(r.obs)+'">')+
   '<div class="flex gap10"><button class="btn ghost" id="ep_cancel" style="flex:1">Cancelar</button><button class="btn primary" id="ep_save" style="flex:1">Salvar</button></div>'+
   '</div></div>';
  var close=function(){state.modal=null;document.getElementById("modalRoot").innerHTML="";};
  document.getElementById("cx").onclick=close;document.getElementById("ep_cancel").onclick=close;
  document.getElementById("ov").onclick=function(e){if(e.target.id==="ov")close();};
  document.getElementById("ep_save").onclick=async function(){
    var body={data:val("ep_data"),colaborador:val("ep_colab"),tecnica:val("ep_tec"),prensagem:val("ep_tec")==="DTF"?val("ep_pren"):"",peca:val("ep_peca"),parte:val("ep_parte"),tipo:val("ep_tipo"),aberta:val("ep_aberta"),inicio:val("ep_inicio"),fim:val("ep_fim"),pausa:val("ep_pausa"),quantidade:val("ep_qt"),obs:val("ep_obs")};
    try{await api("/api/press/"+id,{method:"PUT",body:body});state.pressRecords=await api("/api/press");close();renderTab();toast("Prensagem atualizada");}catch(e){toast("Erro: "+e.message);}
  };
}

/* ===================== BOOT ===================== */
async function boot(){
  state.theme=document.documentElement.getAttribute("data-theme")||"dark";
  state.fmonday=fMondayISO(new Date());
  renderHeader();renderTabbar();
  await loadProducts();await loadCollaborators();
  if(state.pin){try{const r=await api("/api/verify-pin",{method:"POST",body:{pin:state.pin}});if(r.ok){state.unlocked=true;await loadRecords();await loadGestao();}else{state.pin=null;sessionStorage.removeItem("mpin");}}catch(e){}}
  renderHeader();renderTabbar();renderTab();
  syncTimer=setInterval(poll,4000);
}
boot();
</script>
